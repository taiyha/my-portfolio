<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Вход и Регистрация | Taiyha.T</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            max-width: 450px;
            margin: 80px auto;
            background: white;
            padding: 40px;
            border-radius: 30px;
            border: 3px solid #C38EB4;
            text-align: center;
        }
        .auth-form input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 15px;
            border: 1px solid #ddd;
            font-size: 16px;
        }
        .tabs {
            display: flex;
            margin-bottom: 25px;
            border-bottom: 2px solid #eee;
        }
        .tab {
            flex: 1;
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
            color: #666;
        }
        .tab.active {
            color: #C38EB4;
            border-bottom: 2px solid #C38EB4;
        }
    </style>
</head>
<body style="background-color: var(--light-pink);">

    <header class="header">
        <div class="logo">Taiyha.T</div>
        <nav class="nav-menu">
            <a href="index.html">Главная</a>
            <a href="portfolio.html">Портфолио</a>
        </nav>
        <div></div> </header>

    <div class="auth-container">
        <div class="tabs">
            <div class="tab active">Регистрация</div>
        </div>

        <form class="auth-form">
            <input type="text" placeholder="Фамилия" required>
            <input type="text" placeholder="Имя" required>
            <input type="text" placeholder="Отчество">
            <input type="email" placeholder="Электронная почта" required>
            <input type="password" placeholder="Пароль" required>
            <button type="submit" class="btn" style="width: 100%;">Создать аккаунт</button>
        </form>
    </div>

</body>
</html>
